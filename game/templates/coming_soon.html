{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Checkora</title>
    <link rel="icon" type="image/jpeg" href="{% static 'game/favicon.jpeg' %}">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'game/css/coming_soon.css' %}">
</head>
<body>
    <main class="coming-soon-stage">
        <section class="coming-soon-card">
            <img src="{% static 'game/checkora_icon_only.png' %}" class="crest" alt="Checkora crest">
            <p class="feature-label">Upcoming Feature</p>
            <h1>{{ heading }}</h1>
            <p class="message">{{ message }}</p>
            <a class="home-btn" href="{% url 'landing' %}">Return to Main Menu</a>
        </section>
    </main>
    <script src="{% static 'game/js/theme.js' %}?v=1"></script>
</body>
</html>
